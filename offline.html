<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#208AEF" />
    <title>The Cốc đang ngoại tuyến</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
      }
      main {
        max-width: 360px;
        padding: 28px;
        text-align: center;
      }
      .logo {
        width: 84px;
        height: 84px;
        margin: 0 auto 18px;
        border-radius: 24px;
        background: linear-gradient(135deg, #208AEF, #16a34a);
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">TC</div>
      <h1>Chưa có kết nối mạng</h1>
      <p>The Cốc cần mạng để đồng bộ dữ liệu chấm công, kho và báo cáo. Vui lòng kết nối lại rồi mở app.</p>
    </main>
  </body>
</html>
