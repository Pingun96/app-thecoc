name: Supabase Functions Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: gdgoitbivzpcvoirgvjh
      ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID || '1d7708c0-a945-4977-b447-ec3ce5b171bf' }}
      ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "$ONESIGNAL_REST_API_KEY" ]; then
            echo "Missing GitHub secret: ONESIGNAL_REST_API_KEY"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Configure OneSignal secrets
        run: |
          supabase secrets set \
            ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID" \
            ONESIGNAL_REST_API_KEY="$ONESIGNAL_REST_API_KEY" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy send-onesignal-push
        run: |
          supabase functions deploy send-onesignal-push \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt
