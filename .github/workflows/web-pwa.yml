name: Web PWA Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: web-pwa
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}" > .env

      - name: Export web app and Inject iOS Meta
        run: npm run build:pwa
        env:
          EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}

      - name: Prepare static PWA files
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
