name: iOS Build (Unsigned IPA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Native iOS Project
        run: npx expo prebuild --platform ios

      - name: Build iOS (Xcode)
        working-directory: ./ios
        run: |
          # Tìm tên Workspace do Expo tạo ra
          WORKSPACE_NAME=$(ls | grep .xcworkspace)
          # Tên Scheme thường trùng với tên thư mục dự án
          SCHEME_NAME="thecocmobile"
          
          xcodebuild clean build \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          # Tìm file .app sau khi build xong
          APP_PATH=$(find ios/build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Không tìm thấy file .app"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -qr TheCoc-App.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCoc-iOS
          path: thecoc-mobile/TheCoc-App.ipa
