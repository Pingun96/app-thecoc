name: iOS Build (Unsigned IPA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: brew install ninja

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Native iOS Project
        run: npx expo prebuild --platform ios --clean

      - name: Setup Node for Xcode
        working-directory: ./ios
        run: |
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Install CocoaPods
        working-directory: ./ios
        run: pod install

      - name: Build iOS (Xcode)
        working-directory: ./ios
        run: |
          echo "==== THƯ MỤC IOS ===="
          ls -la
          
          WORKSPACE_NAME=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1 | sed 's|^\./||')
          if [ -z "$WORKSPACE_NAME" ]; then
            echo "Error: Không tìm thấy file .xcworkspace!"
            exit 1
          fi
          
          SCHEME_NAME=$(echo "$WORKSPACE_NAME" | sed 's/\.xcworkspace//')
          
          echo "Using Workspace: $WORKSPACE_NAME"
          echo "Using Scheme: $SCHEME_NAME"
          
          set -o pipefail
          xcodebuild clean build \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO | xcpretty

      - name: Package to IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Không tìm thấy file .app"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -qr TheCoc-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCoc-iOS
          path: TheCoc-iOS.ipa
