name: iOS Build (Unsigned IPA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: brew install ninja

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Generate Native iOS Project
        run: npx expo prebuild --platform ios --clean

      - name: Setup Node for Xcode
        working-directory: ./ios
        run: |
          echo "export NODE_BINARY=$(which node)" > .xcode.env
          sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Disable Code Signing in Podfile
        working-directory: ./ios
        run: |
          sed -i '' -e '/post_install do |installer|/a\
            installer.pods_project.targets.each do |target|\
              target.build_configurations.each do |config|\
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                config.build_settings["CODE_SIGN_IDENTITY"] = ""\
              end\
            end\
            installer.aggregate_targets.each do |target|\
              target.user_project.build_configurations.each do |config|\
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                config.build_settings["CODE_SIGN_IDENTITY"] = ""\
              end\
            end\
          ' Podfile

      - name: Install CocoaPods
        working-directory: ./ios
        run: pod install

      - name: Build iOS (Xcode)
        working-directory: ./ios
        run: |
          echo "==== THƯ MỤC IOS ===="
          ls -la
          
          WORKSPACE_NAME=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1 | sed 's|^\./||')
          if [ -z "$WORKSPACE_NAME" ]; then
            echo "Error: Không tìm thấy file .xcworkspace!"
            exit 1
          fi
          
          SCHEME_NAME=$(echo "$WORKSPACE_NAME" | sed 's/\.xcworkspace//')
          
          echo "Using Workspace: $WORKSPACE_NAME"
          echo "Using Scheme: $SCHEME_NAME"
          
          set +e
          xcodebuild clean build \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            ENABLE_USER_SCRIPT_SANDBOXING=NO > ../xcodebuild.log 2>&1
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "Uploading log to termbin..."
            LOG_URL=$(tail -n 15000 ../xcodebuild.log | nc termbin.com 9999)
            
            echo "## ❌ Xcode Build Thất Bại" >> $GITHUB_STEP_SUMMARY
            echo "Hãy copy đường link dưới đây và gửi cho AI để AI đọc toàn bộ log:" >> $GITHUB_STEP_SUMMARY
            echo "**$LOG_URL**" >> $GITHUB_STEP_SUMMARY
            
            echo "==== XCODEBUILD LỖI ===="
            echo "Link log: $LOG_URL"
            exit $BUILD_EXIT_CODE
          fi

      - name: Package to IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Không tìm thấy file .app"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -qr TheCoc-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheCoc-iOS
          path: TheCoc-iOS.ipa
